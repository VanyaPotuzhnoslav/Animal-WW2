<!DOCTYPE html>
<html>
<head>
    <title>Animal WW2: Multiplayer Classic Workshop</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; background: #3d4d2d; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.98)); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .hidden { display: none !important; }

        /* OLD STYLE ADMIN PANEL */
        #admin-overlay { background: rgba(10, 10, 10, 0.98); z-index: 1000; overflow-y: auto; padding: 40px 0; }
        #admin-panel { width: 90%; max-width: 800px; background: #1a1a1a; border: 2px solid #ff3333; padding: 30px; border-radius: 10px; box-shadow: 0 0 30px rgba(255, 0, 0, 0.3); }
        .admin-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 20px; }
        .admin-box { background: #222; padding: 15px; border-radius: 5px; border: 1px solid #333; }
        .admin-box h3 { color: #ff3333; margin-top: 0; border-bottom: 1px solid #ff3333; padding-bottom: 5px; }
        
        label { font-size: 0.75em; color: #888; text-transform: uppercase; font-weight: bold; display: block; margin-top: 10px; }
        input, select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        .admin-btn { background: #ff3333; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .admin-btn:hover { background: #ff5555; }

        /* UI ELEMENTS */
        #scoreboard-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        #scoreboard { background: #1a1a1a; border: 2px solid #555; width: 600px; padding: 20px; border-radius: 8px; }
        #hud { position: absolute; bottom: 20px; right: 20px; text-align: right; pointer-events: none; }
        #ammo-display { font-size: 3em; font-weight: bold; color: #ff9d00; }
        .class-tabs { display: flex; gap: 10px; margin: 15px 0; width: 600px; }
        .class-card { background: rgba(255,255,255,0.1); padding: 15px; cursor: pointer; border-radius: 4px; flex: 1; text-align: center; }
        .class-card.active { background: #ff9d00; color: black; font-weight: bold; }
        .weapon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 600px; }
        .weapon-item { background: rgba(255,255,255,0.05); padding: 12px; border: 1px solid #444; cursor: pointer; }
        .weapon-item.selected { border-color: #ff9d00; background: rgba(255,157,0,0.1); }
        .admin-trigger { position: fixed; bottom: 10px; left: 10px; opacity: 0.2; color: white; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="team-menu" class="overlay">
        <h1>ANIMAL WW2 ONLINE</h1>
        <input type="text" id="room-code" placeholder="ENTER ROOM CODE" style="width: 200px; text-align: center; margin-bottom: 20px;">
        <div class="class-tabs" style="width: 400px;">
            <div class="class-card" onclick="pickTeam('caracal')">CARACALS</div>
            <div class="class-card" onclick="pickTeam('sheep')">SHEEP</div>
        </div>
    </div>

    <div id="class-menu" class="overlay hidden">
        <h2 style="color:#ff9d00">SELECT CLASS & WEAPON</h2>
        <div class="class-tabs">
            <div id="tab-Assault" class="class-card active" onclick="setPlayerClass('Assault')">ASSAULT</div>
            <div id="tab-Medic" class="class-card" onclick="setPlayerClass('Medic')">MEDIC</div>
            <div id="tab-Support" class="class-card" onclick="setPlayerClass('Support')">SUPPORT</div>
            <div id="tab-Sniper" class="class-card" onclick="setPlayerClass('Sniper')">SNIPER</div>
        </div>
        <div id="weapon-grid" class="weapon-grid"></div>
        <button onclick="deploy()" style="padding:15px 100px; background:#ff9d00; border:none; font-weight:bold; cursor:pointer; margin-top: 20px;">DEPLOY</button>
    </div>

    <div id="admin-overlay" class="overlay hidden">
        <div id="admin-panel">
            <h2 style="text-align:center; color:#ff3333; margin-top:0;">FRONT-LINE WORKSHOP</h2>
            
            <div class="admin-section">
                <div class="admin-box">
                    <h3>WEAPON CREATOR</h3>
                    <label>Weapon Name</label><input id="adm-w-name" type="text" placeholder="e.g. MG-42">
                    <label>Class</label>
                    <select id="adm-w-class"><option>Assault</option><option>Medic</option><option>Support</option><option>Sniper</option></select>
                    <label>Damage</label><input id="adm-w-dmg" type="number" value="30">
                    <label>Accuracy Spread (0 = Precise)</label><input id="adm-w-spread" type="number" step="0.01" value="0.1">
                    <label>Magazine Size</label><input id="adm-w-mag" type="number" value="30">
                    <label>Fire Rate (ms)</label><input id="adm-w-rate" type="number" value="200">
                    <button class="admin-btn" onclick="addAdminWeapon()">ADD WEAPON TO GLOBAL ROOM</button>
                </div>

                <div class="admin-box">
                    <h3>UNIT VISUALS</h3>
                    <label>Target Team</label>
                    <select id="adm-v-team"><option value="caracal">Caracals</option><option value="sheep">Sheep</option></select>
                    <label>Target Class</label>
                    <select id="adm-v-class"><option>Assault</option><option>Medic</option><option>Support</option><option>Sniper</option></select>
                    <label>Image URL (PNG/JPG)</label>
                    <input id="adm-v-url" type="text" placeholder="https://site.com/image.png">
                    <button class="admin-btn" style="background:#555;" onclick="updateAdminVisual()">UPDATE CLASS IMAGE</button>
                    
                    <div style="margin-top:20px; border-top:1px solid #444; padding-top:10px;">
                        <button class="admin-btn" style="background:white; color:black;" onclick="closeAdmin()">BACK TO BATTLE</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="scoreboard-overlay">
        <div id="scoreboard">
            <h2 style="text-align:center; margin-top:0;">SCOREBOARD</h2>
            <div id="sb-content"></div>
        </div>
    </div>

    <div id="hud">
        <div id="reload-msg" style="color:#ff3333; font-weight:bold; display:none;">RELOADING...</div>
        <div id="ammo-display">-- / --</div>
    </div>

    <button class="admin-trigger" onclick="authAdmin()">[ADMIN]</button>
    <canvas id="gameCanvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAHNCCE16nqhUPAxr5l7I__bJUBg0Z6tLk",
        authDomain: "animalww2-4571a.firebaseapp.com",
        projectId: "animalww2-4571a",
        storageBucket: "animalww2-4571a.firebasestorage.app",
        messagingSenderId: "975691381971",
        appId: "1:975691381971:web:fbdfba8ed2f13c57d3a826",
        databaseURL: "https://animalww2-4571a-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const WORLD_WIDTH = 5000, WORLD_HEIGHT = 2000;
    
    let myTeam, currentClass = 'Assault', selWeaponKey = 'MP-40', gameStarted = false;
    let playerId = "P_" + Math.floor(Math.random() * 999), currentRoom = "GLOBAL";
    let remotePlayers = {};
    const UNIT_IMAGES = { caracal: {}, sheep: {} };
    let GLOBAL_WEAPONS = {
        'MP-40': { name: 'MP-40', class: 'Assault', damage: 20, fireRate: 150, magSize: 32, reloadTime: 2000, speed: 5.5, spread: 0.1 }
    };
    let bots = [], bullets = [], keys = {}, isMouseDown = false, mouseX = 0, mouseY = 0;

    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    function initRoom() {
        currentRoom = document.getElementById('room-code').value.toUpperCase() || "GLOBAL";
        const myRef = ref(db, `matches/${currentRoom}/players/${playerId}`);
        set(myRef, { name: playerId, team: myTeam, kills: 0, deaths: 0, x: 0, y: 0, angle: 0, hp: 100, class: 'Assault' });
        onDisconnect(myRef).remove();

        onValue(ref(db, `matches/${currentRoom}/players`), snap => { remotePlayers = snap.val() || {}; updateScoreboard(); });
        onValue(ref(db, `matches/${currentRoom}/armory`), snap => { if(snap.val()) { GLOBAL_WEAPONS = {...GLOBAL_WEAPONS, ...snap.val()}; renderWeaponGrid(); } });
        onValue(ref(db, `matches/${currentRoom}/visuals`), snap => {
            const data = snap.val();
            if(data) Object.keys(data).forEach(t => Object.keys(data[t]).forEach(c => { const i = new Image(); i.src = data[t][c]; UNIT_IMAGES[t][c] = i; }));
        });
    }

    // ADMIN LOGIC
    window.authAdmin = () => { if(prompt("Password:") === "Lahazavr88@99") document.getElementById('admin-overlay').classList.remove('hidden'); };
    window.closeAdmin = () => document.getElementById('admin-overlay').classList.add('hidden');
    
    window.addAdminWeapon = () => {
        const w = {
            name: document.getElementById('adm-w-name').value,
            class: document.getElementById('adm-w-class').value,
            damage: parseInt(document.getElementById('adm-w-dmg').value),
            spread: parseFloat(document.getElementById('adm-w-spread').value),
            magSize: parseInt(document.getElementById('adm-w-mag').value),
            fireRate: parseInt(document.getElementById('adm-w-rate').value),
            reloadTime: 2000, speed: 5
        };
        update(ref(db, `matches/${currentRoom}/armory`), { [w.name]: w });
    };

    window.updateAdminVisual = () => {
        const team = document.getElementById('adm-v-team').value;
        const cls = document.getElementById('adm-v-class').value;
        const url = document.getElementById('adm-v-url').value;
        update(ref(db, `matches/${currentRoom}/visuals/${team}`), { [cls]: url });
    };

    class Entity {
        constructor(team, isPlayer = false) { 
            this.team = team; this.isPlayer = isPlayer; this.isDead = true; 
            this.kills = 0; this.deaths = 0; this.name = isPlayer ? playerId : "[BOT]";
            this.hp = 100;
        }
        spawn(wKey) {
            this.x = (this.team === 'caracal') ? 200 : WORLD_WIDTH - 200;
            this.y = 400 + Math.random() * 1200; this.hp = 100;
            this.weapon = {...GLOBAL_WEAPONS[wKey]}; this.ammo = this.weapon.magSize;
            this.class = this.weapon.class; this.isDead = false; this.isReloading = false;
        }
        reload() {
            if(this.isReloading || this.ammo === this.weapon.magSize) return;
            this.isReloading = true;
            if(this.isPlayer) document.getElementById('reload-msg').style.display = 'block';
            setTimeout(() => {
                this.ammo = this.weapon.magSize; this.isReloading = false;
                if(this.isPlayer) document.getElementById('reload-msg').style.display = 'none';
            }, 2000);
        }
        update() {
            if (this.isDead) return;
            if (this.isPlayer) {
                let s = this.weapon.speed;
                if (keys['KeyW']) this.y -= s; if (keys['KeyS']) this.y += s;
                if (keys['KeyA']) this.x -= s; if (keys['KeyD']) this.x += s;
                if (keys['KeyR']) this.reload();
                this.angle = Math.atan2(mouseY - (canvas.height/2), mouseX - (canvas.width/2));
                if (isMouseDown) this.shoot();
                update(ref(db, `matches/${currentRoom}/players/${playerId}`), { x: Math.round(this.x), y: Math.round(this.y), angle: this.angle, hp: this.hp, class: this.class });
            } else {
                this.x += (this.team === 'caracal' ? 1.5 : -1.5);
                if (this.ammo <= 0) this.reload();
                if (Math.random() < 0.01) this.shoot();
            }
        }
        shoot() {
            if (!this.isReloading && Date.now() - this.lastFired > this.weapon.fireRate) {
                if (this.ammo > 0) {
                    const s = (Math.random()-0.5) * this.weapon.spread;
                    bullets.push({ x: this.x, y: this.y, vx: Math.cos(this.angle+s)*22, vy: Math.sin(this.angle+s)*22, team: this.team, damage: this.weapon.damage, owner: this });
                    this.ammo--; this.lastFired = Date.now();
                } else { this.reload(); }
            }
        }
    }

    function updateScoreboard() {
        const list = document.getElementById('sb-content');
        let html = "<div style='display:grid; grid-template-columns: 2fr 1fr 1fr; border-bottom:1px solid #444;'><div>NAME</div><div>KILLS</div><div>DEATHS</div></div>";
        [...Object.values(remotePlayers), ...bots].forEach(p => {
            html += `<div style='display:grid; grid-template-columns: 2fr 1fr 1fr; border-bottom:1px solid #333; padding:5px 0;'><div>${p.name}</div><div>${p.kills||0}</div><div>${p.deaths||0}</div></div>`;
        });
        list.innerHTML = html;
    }

    function gameLoop() {
        ctx.fillStyle = '#3d4d2d'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const p = players[0];
        let camX = 0, camY = 0;
        if(p && !p.isDead) { 
            camX = p.x - canvas.width/2; camY = p.y - canvas.height/2; 
            document.getElementById('ammo-display').innerText = `${p.ammo} / ${p.weapon.magSize}`;
        }
        ctx.save(); ctx.translate(-camX, -camY);
        ctx.fillStyle = '#4b3b2f'; ctx.fillRect(1500, 0, 300, WORLD_HEIGHT); ctx.fillRect(3200, 0, 300, WORLD_HEIGHT);

        [...players, ...bots].forEach(ent => { if(!ent.isDead) { ent.update(); drawUnit(ent.x, ent.y, ent.angle, ent.team, ent.name, ent.hp, ent.class); } });
        Object.keys(remotePlayers).forEach(id => { if(id !== playerId) { const rp = remotePlayers[id]; drawUnit(rp.x, rp.y, rp.angle, rp.team, rp.name, rp.hp, rp.class); } });

        bullets = bullets.filter(b => {
            b.x += b.vx; b.y += b.vy; ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 4, 4);
            let hit = false;
            [...players, ...bots].forEach(t => {
                if(!t.isDead && t.team !== b.team && Math.hypot(b.x-t.x, b.y-t.y)<25) {
                    t.hp -= b.damage; hit = true;
                    if(t.hp <= 0) { 
                        t.isDead = true; t.deaths++; b.owner.kills++;
                        if(t.isPlayer) document.getElementById('class-menu').classList.remove('hidden');
                        else if(bots.includes(t)) setTimeout(() => t.spawn('MP-40'), 5000);
                    }
                }
            });
            return !hit && b.x > 0 && b.x < WORLD_WIDTH;
        });
        ctx.restore(); requestAnimationFrame(gameLoop);
    }

    function drawUnit(x, y, angle, team, name, hp, cls) {
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = 'black'; ctx.fillRect(-25, -45, 50, 5);
        ctx.fillStyle = team === 'caracal' ? '#c19a6b' : '#fff';
        ctx.fillRect(-25, -45, (hp/100)*50, 5);
        ctx.rotate(angle);
        const img = UNIT_IMAGES[team][cls];
        if(img && img.complete) ctx.drawImage(img, -30, -30, 60, 60);
        else {
            ctx.fillStyle = team === 'caracal' ? '#c19a6b' : '#fff';
            ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#222'; ctx.fillRect(15, -4, 30, 8);
        }
        ctx.rotate(-angle); ctx.fillStyle = "white"; ctx.font = "11px Arial"; ctx.textAlign="center"; ctx.fillText(name, 0, -52);
        ctx.restore();
    }

    // HANDLERS
    window.setPlayerClass = (c) => { currentClass = c; document.querySelectorAll('.class-card').forEach(x => x.classList.remove('active')); document.getElementById(`tab-${c}`).classList.add('active'); renderWeaponGrid(); };
    window.renderWeaponGrid = () => {
        const grid = document.getElementById('weapon-grid'); grid.innerHTML = '';
        Object.keys(GLOBAL_WEAPONS).filter(k => GLOBAL_WEAPONS[k].class === currentClass).forEach(key => {
            const div = document.createElement('div'); div.className = `weapon-item ${selWeaponKey === key ? 'selected' : ''}`;
            div.innerHTML = `<b>${GLOBAL_WEAPONS[key].name}</b>`;
            div.onclick = () => { selWeaponKey = key; renderWeaponGrid(); }; grid.appendChild(div);
        });
    };
    let players = [];
    window.pickTeam = (t) => { myTeam = t; initRoom(); document.getElementById('team-menu').classList.add('hidden'); document.getElementById('class-menu').classList.remove('hidden'); if(!gameStarted) { players.push(new Entity(myTeam, true)); for(let i=0; i<6; i++) { let b=new Entity(i<3?'caracal':'sheep'); b.spawn('MP-40'); bots.push(b); } gameStarted = true; requestAnimationFrame(gameLoop); } };
    window.deploy = () => { players[0].spawn(selWeaponKey); document.getElementById('class-menu').classList.add('hidden'); };
    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Tab') { e.preventDefault(); document.getElementById('scoreboard-overlay').style.display = 'flex'; } });
    window.addEventListener('keyup', e => { keys[e.code] = false; if(e.code === 'Tab') document.getElementById('scoreboard-overlay').style.display = 'none'; });
    window.addEventListener('mousedown', () => isMouseDown = true); window.addEventListener('mouseup', () => isMouseDown = false);
    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
</script>
</body>
</html>
