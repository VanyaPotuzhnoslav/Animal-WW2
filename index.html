<!DOCTYPE html>
<html>
<head>
    <title>Animal WW2: Persistent Front</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; background: #3d4d2d; cursor: crosshair; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .hidden { display: none !important; }
        #hud { position: absolute; bottom: 20px; right: 20px; text-align: right; pointer-events: none; z-index: 10; }
        #ammo-display { font-size: 2.5em; font-weight: bold; color: #ff9d00; }
        #fuah-display { font-size: 1.5em; color: #2ecc71; font-weight: bold; }
        #admin-overlay { background: rgba(10, 10, 10, 0.98); z-index: 1000; overflow-y: auto; padding: 20px; }
        .admin-box { background: #222; padding: 15px; border: 1px solid #ff3333; margin: 10px; border-radius: 5px; }
        input, select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .weapon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 600px; pointer-events: auto; }
        .weapon-item { background: rgba(255,255,255,0.05); padding: 12px; border: 1px solid #444; cursor: pointer; position: relative; }
        .weapon-item.selected { border-color: #ff9d00; background: rgba(255,157,0,0.2); }
        .price-tag { position: absolute; top: 5px; right: 5px; color: #2ecc71; font-size: 0.8em; }
        #scoreboard-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 500; pointer-events: none; }
        #scoreboard { background: #1a1a1a; padding: 20px; border: 2px solid #555; pointer-events: auto; }
        .admin-trigger { position: fixed; bottom: 10px; left: 10px; opacity: 0.1; color: white; background: none; border: none; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

    <div id="team-menu" class="overlay">
        <h1>ANIMAL WW2</h1>
        <div style="display:flex; flex-direction:column; gap:10px; width:250px;">
            <input type="text" id="room-code" placeholder="ROOM CODE (e.g. ALPHA)" style="text-align: center;">
            <input type="text" id="player-nick" placeholder="NICKNAME" style="text-align: center;">
        </div>
        <p style="font-size: 0.8em; color: #2ecc71; margin: 15px 0;">Stats are now GLOBAL for your Nickname!</p>
        <div style="display:flex; gap:20px;">
            <button onclick="pickTeam('caracal')" style="padding:20px 40px; font-weight:bold; cursor:pointer;">CARACALS</button>
            <button onclick="pickTeam('sheep')" style="padding:20px 40px; font-weight:bold; cursor:pointer;">SHEEP</button>
        </div>
    </div>

    <div id="class-menu" class="overlay hidden">
        <h2 style="color:#ff9d00">SELECT LOADOUT</h2>
        <div id="fuah-menu-display" style="color:#2ecc71; font-weight:bold; margin-bottom:10px;">FUAH: 0</div>
        <div style="margin-bottom:15px; display:flex; gap:10px;">
            <button onclick="setPlayerClass('Assault')">Assault</button>
            <button onclick="setPlayerClass('Medic')">Medic</button>
            <button onclick="setPlayerClass('Support')">Support</button>
            <button onclick="setPlayerClass('Sniper')">Sniper</button>
            <button onclick="setPlayerClass('Tank')" style="background: #556b2f; color: white;">Tank</button>
        </div>
        <div id="weapon-grid" class="weapon-grid"></div>
        <button onclick="deploy()" style="padding:15px 100px; background:#ff9d00; border:none; font-weight:bold; cursor:pointer; margin-top: 20px;">DEPLOY</button>
    </div>

    <div id="admin-overlay" class="overlay hidden">
        <div style="width: 90%; max-width: 800px;">
            <div class="admin-box">
                <h3>GLOBAL CREATOR</h3>
                <label>Name</label><input id="adm-w-name" type="text" placeholder="Name">
                <label>Class</label>
                <select id="adm-w-class"><option>Assault</option><option>Medic</option><option>Support</option><option>Sniper</option><option>Tank</option></select>
                <label>Price</label><input id="adm-w-price" type="number" value="500">
                <label>Damage</label><input id="adm-w-dmg" type="number" value="25">
                <label>Accuracy Spread</label><input id="adm-w-spread" type="number" step="0.01" value="0.1">
                <label>Fire Rate (ms)</label><input id="adm-w-rate" type="number" value="200">
                <label>Magazine Size</label><input id="adm-w-mag" type="number" value="30">
                <label>HP Bonus (Tanks only)</label><input id="adm-w-hp" type="number" value="0">
                <label>Speed Modifier (e.g. 0.8 or 2.0)</label><input id="adm-w-speed" type="number" step="0.1" value="1.8">
                <button onclick="addAdminWeapon()" style="width:100%; padding:10px; margin-top:10px; background:#ff3333; color:white; border:none; cursor:pointer;">ADD ITEM</button>
            </div>
            <div class="admin-box">
                <h3>VISUALS</h3>
                <select id="adm-v-team"><option value="caracal">Caracal</option><option value="sheep">Sheep</option></select>
                <select id="adm-v-class"><option>Assault</option><option>Medic</option><option>Support</option><option>Sniper</option><option>Tank</option></select>
                <input id="adm-v-url" type="text" placeholder="Image URL">
                <button onclick="updateAdminVisual()" style="width:100%; padding:10px; margin-top:10px; background:#444; color:white; border:none; cursor:pointer;">UPDATE IMAGE</button>
            </div>
            <button onclick="closeAdmin()" style="width:100%; padding:10px; background:white; color:black; border:none; cursor:pointer;">EXIT ADMIN</button>
        </div>
    </div>

    <div id="scoreboard-overlay"><div id="scoreboard"><h3>BATTLEFIELD STATS</h3><div id="sb-content"></div></div></div>

    <div id="hud">
        <div id="fuah-display">FUAH: 0</div>
        <div id="reload-msg" style="color:#ff3333; font-weight:bold; display:none;">RELOADING...</div>
        <div id="ammo-display">-- / --</div>
    </div>

    <button class="admin-trigger" onclick="authAdmin()">[ADMIN]</button>
    <canvas id="gameCanvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAHNCCE16nqhUPAxr5l7I__bJUBg0Z6tLk",
        authDomain: "animalww2-4571a.firebaseapp.com",
        projectId: "animalww2-4571a",
        storageBucket: "animalww2-4571a.firebasestorage.app",
        messagingSenderId: "975691381971",
        appId: "1:975691381971:web:fbdfba8ed2f13c57d3a826",
        databaseURL: "https://animalww2-4571a-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const WORLD_WIDTH = 5000, WORLD_HEIGHT = 2000;
    
    let myTeam, currentClass = 'Assault', selWeaponKey = 'MP-40', gameStarted = false;
    let playerId = "", currentRoom = "GLOBAL";
    let myFuah = 0, cameraX = 0, cameraY = 0;
    let unlockedWeapons = ['MP-40']; 
    let remotePlayers = {};
    const UNIT_IMAGES = { caracal: {}, sheep: {} };
    let GLOBAL_WEAPONS = { 'MP-40': { name: 'MP-40', class: 'Assault', damage: 20, fireRate: 180, magSize: 32, price: 0, speed: 1.8, spread: 0.12, hpBonus: 0 } };
    let bots = [], bullets = [], keys = {}, isMouseDown = false, mouseX = 0, mouseY = 0;

    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    async function initRoom() {
        currentRoom = document.getElementById('room-code').value.toUpperCase() || "GLOBAL";
        let nick = document.getElementById('player-nick').value.trim();
        playerId = nick ? nick : "P_" + Math.floor(Math.random() * 999);
        
        const globalUserRef = ref(db, `users/${playerId}`);
        const userSnap = await get(globalUserRef);
        
        if (userSnap.exists()) {
            const userData = userSnap.val();
            myFuah = userData.fuah || 0;
            unlockedWeapons = userData.unlocked || ['MP-40'];
        } else {
            await set(globalUserRef, { fuah: 0, unlocked: ['MP-40'] });
        }

        const matchRef = ref(db, `matches/${currentRoom}/players/${playerId}`);
        await update(matchRef, { name: playerId, team: myTeam, x: 0, y: 0, angle: 0, hp: 100, kills: 0, isOnline: true });
        onDisconnect(matchRef).update({ isOnline: false });
        
        onValue(globalUserRef, snap => {
            if(snap.exists()){
                myFuah = snap.val().fuah || 0;
                unlockedWeapons = snap.val().unlocked || ['MP-40'];
                renderWeaponGrid();
            }
        });

        onValue(ref(db, `matches/${currentRoom}/players`), snap => { 
            remotePlayers = snap.val() || {}; 
            updateScoreboard(); 
        });
        
        onValue(ref(db, `global_armory`), snap => { if(snap.val()) { GLOBAL_WEAPONS = {...GLOBAL_WEAPONS, ...snap.val()}; renderWeaponGrid(); } });

        // Restore visual syncing
        onValue(ref(db, `matches/${currentRoom}/visuals`), snap => {
            const data = snap.val();
            if(data) Object.keys(data).forEach(t => Object.keys(data[t]).forEach(c => { const i = new Image(); i.src = data[t][c]; UNIT_IMAGES[t][c] = i; }));
        });
    }

    window.authAdmin = () => { if(prompt("Pass:") === "Lahazavr88@99") document.getElementById('admin-overlay').classList.remove('hidden'); };
    window.closeAdmin = () => document.getElementById('admin-overlay').classList.add('hidden');
    
    window.addAdminWeapon = () => {
        const w = { 
            name: document.getElementById('adm-w-name').value, 
            class: document.getElementById('adm-w-class').value, 
            price: parseInt(document.getElementById('adm-w-price').value), 
            damage: parseInt(document.getElementById('adm-w-dmg').value), 
            spread: parseFloat(document.getElementById('adm-w-spread').value), 
            magSize: parseInt(document.getElementById('adm-w-mag').value), 
            fireRate: parseInt(document.getElementById('adm-w-rate').value), 
            hpBonus: parseInt(document.getElementById('adm-w-hp').value),
            speed: parseFloat(document.getElementById('adm-w-speed').value)
        };
        update(ref(db, `global_armory`), { [w.name]: w });
    };

    window.updateAdminVisual = () => { update(ref(db, `matches/${currentRoom}/visuals/${document.getElementById('adm-v-team').value}`), { [document.getElementById('adm-v-class').value]: document.getElementById('adm-v-url').value }); };

    class Entity {
        constructor(team, isPlayer = false) { 
            this.team = team; this.isPlayer = isPlayer; this.isDead = true; 
            this.name = isPlayer ? playerId : "[BOT]"; this.hp = 100; this.maxHp = 100; this.angle = 0; this.lastFired = 0;
            this.targetX = 2500; this.targetY = 1000; this.moveTimer = 0;
        }
        spawn(wKey) {
            this.x = (this.team === 'caracal') ? 100 : WORLD_WIDTH - 100;
            this.y = 200 + Math.random() * (WORLD_HEIGHT - 400); 
            this.weapon = {...GLOBAL_WEAPONS[wKey]}; 
            this.maxHp = 100 + (this.weapon.hpBonus || 0);
            this.hp = this.maxHp;
            this.ammo = this.weapon.magSize;
            this.class = this.weapon.class;
            this.isDead = false; this.isReloading = false;
        }
        update() {
            if (this.isDead) return;
            let s = this.weapon.speed || 1.8;
            if (this.isPlayer) {
                if (keys['KeyW']) this.y -= s; if (keys['KeyS']) this.y += s;
                if (keys['KeyA']) this.x -= s; if (keys['KeyD']) this.x += s;
                this.x = Math.max(20, Math.min(WORLD_WIDTH - 20, this.x));
                this.y = Math.max(20, Math.min(WORLD_HEIGHT - 20, this.y));
                if (keys['KeyR']) this.reload();
                this.angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
                if (isMouseDown) this.shoot();
                update(ref(db, `matches/${currentRoom}/players/${playerId}`), { x: Math.round(this.x), y: Math.round(this.y), angle: this.angle, hp: this.hp, maxHp: this.maxHp, class: this.class, isOnline: true });
            } else {
                if (Date.now() > this.moveTimer) {
                    this.targetX = 1500 + Math.random() * 2000;
                    this.targetY = 200 + Math.random() * (WORLD_HEIGHT - 400);
                    this.moveTimer = Date.now() + 3000 + Math.random() * 5000;
                }
                let dx = this.targetX - this.x; let dy = this.targetY - this.y;
                let dist = Math.hypot(dx, dy);
                if(dist > 10) { this.x += (dx/dist)*s*0.6; this.y += (dy/dist)*s*0.6; }
                let targets = [...players, ...Object.values(remotePlayers)].filter(t => !t.isDead && t.team !== this.team && Math.hypot(t.x-this.x, t.y-this.y) < 600);
                if(targets.length > 0) {
                    this.angle = Math.atan2(targets[0].y - this.y, targets[0].x - this.x);
                    if(Math.random() < 0.02) this.shoot();
                }
                if (this.ammo <= 0) this.reload();
            }
        }
        shoot() {
            if (!this.isReloading && Date.now() - this.lastFired > (this.isPlayer ? this.weapon.fireRate : this.weapon.fireRate * 1.5)) {
                if (this.ammo > 0) {
                    const off = (Math.random()-0.5) * (this.weapon.spread || 0.1);
                    bullets.push({ x: this.x, y: this.y, vx: Math.cos(this.angle+off)*12, vy: Math.sin(this.angle+off)*12, team: this.team, damage: this.weapon.damage, owner: this });
                    this.ammo--; this.lastFired = Date.now();
                } else this.reload();
            }
        }
        reload() { if(!this.isReloading && this.ammo < this.weapon.magSize) { this.isReloading = true; if(this.isPlayer) document.getElementById('reload-msg').style.display='block'; setTimeout(() => { this.ammo = this.weapon.magSize; this.isReloading = false; if(this.isPlayer) document.getElementById('reload-msg').style.display='none'; }, 2000); } }
    }

   function gameLoop() {
    // 1. Draw Background (Grass)
    if (MAP_IMAGES.grass.complete) {
        const pattern = ctx.createPattern(MAP_IMAGES.grass, 'repeat');
        ctx.fillStyle = pattern;
        ctx.save();
        ctx.translate(-cameraX, -cameraY);
        ctx.fillRect(cameraX, cameraY, canvas.width, canvas.height);
        ctx.restore();
    } else {
        ctx.fillStyle = '#3d4d2d'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    const p = players[0];
    if(p && !p.isDead) { 
        cameraX = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, p.x - canvas.width/2));
        cameraY = Math.max(0, Math.min(WORLD_HEIGHT - canvas.height, p.y - canvas.height/2));
        document.getElementById('ammo-display').innerText = `${p.ammo} / ${p.weapon.magSize}`;
        document.getElementById('fuah-display').innerText = `FUAH: ${myFuah}`;
    }

    ctx.save(); 
    ctx.translate(-cameraX, -cameraY);

    // 2. Draw Trenches
    if (MAP_IMAGES.trench.complete) {
        ctx.drawImage(MAP_IMAGES.trench, 1500, 0, 150, WORLD_HEIGHT);
        ctx.drawImage(MAP_IMAGES.trench, 3350, 0, 150, WORLD_HEIGHT);
    } else {
        ctx.fillStyle = '#4b3b2f'; 
        ctx.fillRect(1500, 0, 150, WORLD_HEIGHT); 
        ctx.fillRect(3350, 0, 150, WORLD_HEIGHT);
    }

    // 3. Update/Draw Local Players & Bots
    [...players, ...bots].forEach(ent => { 
        if(!ent.isDead) { 
            ent.update(); 
            drawUnit(ent.x, ent.y, ent.angle, ent.team, ent.name, ent.hp, ent.maxHp, ent.class); 
        } 
    });

    // 4. Draw Remote Players
    Object.keys(remotePlayers).forEach(id => { 
        if(id !== playerId && remotePlayers[id].isOnline) { 
            const rp = remotePlayers[id]; 
            drawUnit(rp.x, rp.y, rp.angle, rp.team, rp.name, rp.hp, rp.maxHp, rp.class); 
        } 
    });

    // 5. Bullet Logic (Movement & Damage)
    bullets = bullets.filter(b => {
        b.x += b.vx; b.y += b.vy; 
        ctx.fillStyle = 'yellow'; 
        ctx.fillRect(b.x, b.y, 4, 4);
        
        let hit = false;

        // --- CHECK HIT ON BOTS & LOCAL PLAYER ---
        [...players, ...bots].forEach(t => {
            if(!t.isDead && t.team !== b.team && Math.hypot(b.x-t.x, b.y-t.y) < 30) {
                t.hp -= b.damage; hit = true;
                if(t.hp <= 0) { 
                    t.isDead = true; 
                    if(b.owner.isPlayer) { 
                        update(ref(db, `users/${playerId}`), { fuah: myFuah + 100 });
                        update(ref(db, `matches/${currentRoom}/players/${playerId}`), { kills: (remotePlayers[playerId]?.kills || 0) + 1 }); 
                    }
                    if(t.isPlayer) document.getElementById('class-menu').classList.remove('hidden');
                    else if(bots.includes(t)) setTimeout(() => t.spawn('MP-40'), 4000);
                }
            }
        });

        // --- NEW: CHECK HIT ON REMOTE PLAYERS ---
        if(!hit && b.owner.isPlayer) { // Only check if YOUR bullet hit them
            Object.keys(remotePlayers).forEach(id => {
                const rp = remotePlayers[id];
                if(id !== playerId && rp.isOnline && rp.team !== b.team && Math.hypot(b.x - rp.x, b.y - rp.y) < 30) {
                    let newHp = (rp.hp || 100) - b.damage;
                    hit = true;
                    
                    // Tell Firebase this remote player took damage
                    const targetRef = ref(db, `matches/${currentRoom}/players/${id}`);
                    if(newHp <= 0) {
                        update(targetRef, { hp: 0, isOnline: true }); // Kill them in DB
                        update(ref(db, `users/${playerId}`), { fuah: myFuah + 100 }); // Reward you
                        update(ref(db, `matches/${currentRoom}/players/${playerId}`), { kills: (remotePlayers[playerId]?.kills || 0) + 1 });
                    } else {
                        update(targetRef, { hp: newHp });
                    }
                }
            });
        }

        return !hit && b.x > 0 && b.x < WORLD_WIDTH && b.y > 0 && b.y < WORLD_HEIGHT;
    });

    ctx.restore(); 
    requestAnimationFrame(gameLoop);
}

    window.setPlayerClass = (c) => { currentClass = c; renderWeaponGrid(); };
    window.renderWeaponGrid = () => {
        const grid = document.getElementById('weapon-grid'); grid.innerHTML = '';
        document.getElementById('fuah-menu-display').innerText = `FUAH: ${myFuah}`;
        Object.keys(GLOBAL_WEAPONS).filter(k => GLOBAL_WEAPONS[k].class === currentClass).forEach(key => {
            const w = GLOBAL_WEAPONS[key];
            const isUnlocked = unlockedWeapons.includes(key);
            const div = document.createElement('div'); div.className = `weapon-item ${selWeaponKey === key ? 'selected' : ''}`;
            div.innerHTML = `<span class="price-tag" style="color:${isUnlocked?'#2ecc71':'#ff9d00'}">${isUnlocked ? 'UNLOCKED' : w.price + ' F'}</span><b>${w.name}</b><br><small>${w.hpBonus ? '+'+w.hpBonus+' HP' : ''}</small>`;
            div.onclick = () => { if(isUnlocked || myFuah >= w.price) { selWeaponKey = key; renderWeaponGrid(); } else alert("No FUAH!"); };
            grid.appendChild(div);
        });
    };

    let players = [];
    window.pickTeam = (t) => { 
        myTeam = t; 
        initRoom().then(() => {
            document.getElementById('team-menu').classList.add('hidden'); 
            document.getElementById('class-menu').classList.remove('hidden'); 
            if(!gameStarted) { 
                players.push(new Entity(myTeam, true)); 
                for(let i=0; i<8; i++) { let b=new Entity(i<4?'caracal':'sheep'); b.spawn('MP-40'); bots.push(b); } 
                gameStarted = true; requestAnimationFrame(gameLoop); 
            }
        });
    };
    
    window.deploy = () => { 
        const w = GLOBAL_WEAPONS[selWeaponKey]; 
        if(!unlockedWeapons.includes(selWeaponKey)) {
            myFuah -= w.price; 
            unlockedWeapons.push(selWeaponKey);
            update(ref(db, `users/${playerId}`), { fuah: myFuah, unlocked: unlockedWeapons }); 
        }
        players[0].spawn(selWeaponKey); 
        document.getElementById('class-menu').classList.add('hidden'); 
    };

    window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'Tab') document.getElementById('scoreboard-overlay').style.display = 'flex'; };
    window.onkeyup = (e) => { keys[e.code] = false; if(e.code === 'Tab') document.getElementById('scoreboard-overlay').style.display = 'none'; };
    window.onmousedown = (e) => { if(e.target.tagName === 'CANVAS') isMouseDown = true; };
    window.onmouseup = () => isMouseDown = false;
    window.onmousemove = (e) => { mouseX = e.clientX; mouseY = e.clientY; };
</script>
</body>
</html>
